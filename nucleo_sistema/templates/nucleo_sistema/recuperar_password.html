{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <title>Recuperar Acceso - Market Data</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .caja { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { margin-top: 0; color: #343a40; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; background: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error { color: #dc3545; font-size: 0.85em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="caja">
        <h2>Recuperar Clave</h2>
        <p style="font-size: 0.9em; color: #666; text-align: center;">Válido solo para Administradores y Analistas.</p>
        
        {% if error %} <div class="error">{{ error }}</div> {% endif %}
        
        <form method="POST" action="{% url 'procesar_recuperacion' %}">
            {% csrf_token %}
            <input type="email" name="mail" placeholder="Ingrese su correo registrado" required>
            <button type="submit" class="btn">Enviar Clave Temporal</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'pantalla_login' %}" style="font-size: 0.9em; color: #007bff; text-decoration: none;">Volver al Login</a>
        </div>
    </div>
</body>
</html>
