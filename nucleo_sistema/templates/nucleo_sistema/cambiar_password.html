{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Market Data POS</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <style>
        body { font-family: Arial, sans-serif; background-color: #343a40; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .contenedor-login { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        h1 { color: #007bff; margin-bottom: 5px; font-size: 1.8em; }
        h3 { color: #dc3545; margin-top: 0; margin-bottom: 20px; font-size: 1em; }
        .grupo-input { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #495057; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; font-size: 1.1em; }
        input:focus { border-color: #80bdff; outline: none; }
        .btn-ingresar { background-color: #007bff; color: white; padding: 15px; font-size: 1.1em; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        .btn-ingresar:hover { background-color: #0056b3; }
        .alerta { padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 0.95em; text-align: center; border: 1px solid transparent; font-weight: bold; }
        .alerta-error { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <div class="contenedor-login">
        <h1>Actualización Requerida</h1>
        <h3>Debes cambiar tu clave temporal</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alerta alerta-error">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'procesar_cambio_password' %}">
            {% csrf_token %}
            <div class="grupo-input">
                <label>Nueva Contraseña</label>
                <input type="password" name="nueva_clave" placeholder="Ingresa tu nueva clave" required autofocus minlength="6">
            </div>
            <div class="grupo-input">
                <label>Confirmar Contraseña</label>
                <input type="password" name="confirmar_clave" placeholder="Repite la clave" required minlength="6">
            </div>
            <button type="submit" class="btn-ingresar">Actualizar y Entrar</button>
        </form>
    </div>
</body>
</html>
